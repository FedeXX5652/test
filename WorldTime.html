<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Time</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { box-sizing: border-box; }

    :root {
      --primary: #10B981;
      --primary-light: #34D399;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --bg-primary: #0F172A;
      --bg-secondary: #1E293B;
      --bg-tertiary: #334155;
      --text-primary: #F8FAFC;
      --text-secondary: #CBD5E1;
      --text-muted: #64748B;
      --border: #334155;
      --border-hover: #475569;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, var(--bg-primary) 0%, #1a1a2e 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container { max-width: 900px; margin: 0 auto; animation: fadeIn 0.8s ease-out; }

    h1 {
      text-align: center;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 700;
      margin: 0 0 40px 0;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
      overflow: visible;
    }
    .section:hover { border-color: var(--border-hover); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .section h2 { font-size: 1.25rem; font-weight: 600; margin: 0 0 20px 0; color: var(--text-primary); display: flex; align-items: center; gap: 12px; }

    /* Search */
    .search-row { display: flex; gap: 12px; align-items: stretch; flex-wrap: wrap; }
    .search-wrapper { position: relative; flex: 1; min-width: 220px; overflow: visible; }
    .search-wrapper input { width: 100%; padding-left: 40px; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; pointer-events: none; z-index: 1;
    }
    #dropdown {
      position: absolute;
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 12px; max-height: 260px; overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.7); z-index: 9999;
      display: none; top: 0; left: 0;
    }
    #dropdown.open { display: block; }
    .drop-item {
      padding: 11px 16px; cursor: pointer; border-bottom: 1px solid rgba(71,85,105,0.3);
      font-size: 0.875rem; transition: background 0.15s;
    }
    .drop-item:last-child { border-bottom: none; }
    .drop-item:hover { background: var(--bg-tertiary); }
    .drop-item .tz-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .drop-loading { padding: 14px 16px; color: var(--text-muted); font-size: 0.875rem; font-style: italic; }
    .drop-section-label {
      padding: 8px 16px 4px; font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); font-weight: 600;
      background: rgba(15,23,42,0.5);
    }

    /* Controls - time mode selector */
    .controls-row {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .time-mode-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px !important;
      border-radius: 8px !important;
      font-size: 0.875rem !important;
      font-weight: 500 !important;
      cursor: pointer;
      background: var(--bg-tertiary) !important;
      color: var(--text-muted) !important;
      border: 2px solid transparent !important;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .time-mode-btn:hover { color: var(--text-primary) !important; transform: none !important; }
    .time-mode-btn.selected {
      background: rgba(16,185,129,0.15) !important;
      color: var(--primary) !important;
      border-color: var(--primary) !important;
    }
    .time-mode-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }

    /* Inputs / buttons global */
    input, select, button {
      padding: 10px 14px; border: 1px solid var(--border);
      background: var(--bg-secondary); color: var(--text-primary);
      border-radius: 8px; font-family: inherit; font-size: 0.875rem; transition: all 0.2s ease;
    }
    input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
    input::placeholder { color: var(--text-muted); }
    button { background: var(--primary); color: #0f172a; border: none; cursor: pointer; font-weight: 600; white-space: nowrap; }
    button:hover { background: var(--primary-light); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    .btn-secondary { background: var(--bg-tertiary) !important; color: var(--text-secondary) !important; border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border-hover) !important; color: var(--text-primary) !important; }
    .btn-icon { padding: 8px 10px !important; font-size: 1rem; background: var(--bg-tertiary) !important; color: var(--text-secondary) !important; border: 1px solid var(--border); }
    .btn-icon:hover { background: var(--border-hover) !important; }
    .btn-icon.active { background: rgba(16,185,129,0.2) !important; color: var(--primary) !important; border-color: var(--primary); }
    input[type="time"] { min-width: 110px; }

    /* Connection status */
    .connection-status {
      padding: 4px 12px; border-radius: 6px; font-size: 0.75rem;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .connection-status.online { background: rgba(16,185,129,0.2); color: var(--success); border: 1px solid var(--success); }
    .connection-status.offline { background: rgba(245,158,11,0.2); color: var(--warning); border: 1px solid var(--warning); }

    /* City cards */
    #cities-container { display: flex; flex-direction: column; gap: 12px; }

    .city-card {
      background: rgba(51,65,85,0.5); border: 2px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: grab; transition: all 0.25s ease;
      animation: slideIn 0.3s ease-out;
      position: relative; overflow: hidden;
    }
    .city-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 4px; background: var(--period-color, var(--border));
      transition: background 0.5s ease;
    }
    .city-card:hover { transform: translateY(-3px); border-color: var(--border-hover); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .city-card:active { cursor: grabbing; }
    .city-card.is-base {
      border-color: var(--primary);
      box-shadow: 0 0 0 1px var(--primary), 0 8px 24px rgba(16,185,129,0.15);
    }
    .city-card.dragging { opacity: 0.5; transform: scale(0.98); }
    .city-card.drag-over { border-color: var(--primary-light); }

    .city-left { flex: 1; min-width: 0; }
    .city-name { font-size: 1rem; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .city-tz { font-size: 0.75rem; color: var(--text-muted); }

    .city-center { text-align: center; flex-shrink: 0; padding: 0 20px; }
    .city-time {
      font-size: 2.2rem; font-weight: 700;
      font-variant-numeric: tabular-nums; letter-spacing: 1px;
      line-height: 1;
    }
    .city-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .city-period {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; margin-top: 4px;
      color: var(--period-color, var(--text-muted));
    }
    .city-diff {
      font-size: 0.8rem; color: var(--text-secondary);
      margin-top: 4px;
    }

    .city-right { display: flex; gap: 6px; flex-shrink: 0; }

    /* Period colors */
    .period-night { --period-color: #6366F1; }
    .period-morning { --period-color: #F59E0B; }
    .period-afternoon { --period-color: #10B981; }
    .period-evening { --period-color: #F97316; }

    .city-time.period-night { color: #a5b4fc; }
    .city-time.period-morning { color: #FCD34D; }
    .city-time.period-afternoon { color: #34D399; }
    .city-time.period-evening { color: #FDBA74; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 48px 20px; color: var(--text-muted);
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 1rem; margin: 4px 0; }

    /* Status message */
    .status-msg {
      padding: 10px 14px; border-radius: 8px; font-size: 0.875rem;
      font-weight: 500; text-align: center; margin-top: 12px;
    }
    .status-msg.error { background: rgba(239,68,68,0.1); border: 1px solid var(--danger); color: var(--danger); }
    .status-msg.warn { background: rgba(245,158,11,0.1); border: 1px solid var(--warning); color: var(--warning); }
    .status-msg.ok { background: rgba(16,185,129,0.1); border: 1px solid var(--success); color: var(--success); }

    /* Responsive */
    @media (max-width: 600px) {
      body { padding: 10px; }
      h1 { margin-bottom: 24px; }
      .section { padding: 16px 14px; }
      .city-card { flex-wrap: wrap; gap: 12px; }
      .city-center { padding: 0; }
      .city-time { font-size: 1.8rem; }
      .search-row { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🌍 World Time</h1>

  <!-- Search + Controls -->
  <div class="section">
    <h2>
      🔍 Agregar ciudad
      <span id="conn-status" class="connection-status" style="margin-left: auto; font-size: 0.7rem;"></span>
    </h2>

    <div class="search-row" style="margin-bottom: 16px;">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>

      </div>
      <button class="btn-secondary" onclick="addCurrentLocation()" title="Agregar mi ubicación">📍 Mi zona</button>
    </div>

    <div class="controls-row">
      <button class="time-mode-btn selected" id="btn-now" onclick="setModeNow()">
        <span class="time-mode-dot"></span> Hora actual
      </button>
      <button class="time-mode-btn" id="btn-custom" onclick="setModeCustom()">
        <span class="time-mode-dot"></span> Hora específica
      </button>
      <input type="time" id="custom-time" value="12:00" disabled oninput="onCustomTime(this)"
             style="opacity:0.4; pointer-events:none; transition: opacity 0.2s;">
      <span id="status-msg" style="font-size: 0.8rem; color: var(--text-muted); margin-left: auto;"></span>
    </div>
  </div>

  <!-- Cities -->
  <div class="section">
    <h2>🕐 Zonas horarias</h2>
    <div id="cities-container">
      <div class="empty-state">
        <div class="emoji">🌐</div>
        <p><strong>No hay ciudades añadidas</strong></p>
        <p>Buscá una ciudad arriba o agregá tu zona horaria</p>
      </div>
    </div>
  </div>
</div>

// ─────────────────────────────────────────────
// ESTADO
// ─────────────────────────────────────────────
const STORAGE_KEY = "worldtime_v3";
let state = { cities: [], base: 0, useNow: true, custom: "12:00" };

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(_) {}
}
function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = { ...state, ...JSON.parse(s) };
  } catch(_) {}
}

// ─────────────────────────────────────────────
// CONEXIÓN
// ─────────────────────────────────────────────
const connEl = document.getElementById("conn-status");
function updateConn() {
  const on = navigator.onLine;
  connEl.textContent = on ? "● ONLINE" : "● OFFLINE";
  connEl.className = "connection-status " + (on ? "online" : "offline");
}

// ─────────────────────────────────────────────
// TIEMPO
// ─────────────────────────────────────────────
function baseDate() {
  if (state.useNow) return new Date();
  // Hora custom: interpretamos la hora elegida como si fuera la hora de la ciudad BASE.
  // Estrategia: calculamos el offset UTC actual del timezone base,
  // luego construimos un timestamp UTC que corresponde a "hh:mm en baseTZ hoy".
  const baseTZ = state.cities[state.base]?.tz || Intl.DateTimeFormat().resolvedOptions().timeZone;
  const [hh, mm] = state.custom.split(":").map(Number);

  // Fecha de hoy en el timezone base (año/mes/día locales en esa zona)
  const now = new Date();
  const fmt = new Intl.DateTimeFormat("en-CA", {
    timeZone: baseTZ,
    year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false
  });
  const parts = Object.fromEntries(fmt.formatToParts(now).map(p => [p.type, p.value]));
  // Reconstruimos un Date que represente medianoche local en baseTZ
  // usando el offset: diferencia entre UTC y la hora local en esa zona
  const localMidnightStr = `${parts.year}-${parts.month}-${parts.day}T00:00:00`;
  // Offset = UTC_hour - local_hour (en horas enteras + fracción)
  // Forma robusta: tomamos un instante conocido y calculamos la diferencia
  const localAsUTC = new Date(`${parts.year}-${parts.month}-${parts.day}T${parts.hour}:${parts.minute}:${parts.second}Z`);
  const offsetMs = localAsUTC.getTime() - now.getTime();
  // Medianoche UTC ajustada al timezone base
  const midnightUTC = new Date(new Date(localMidnightStr + "Z").getTime() - offsetMs);
  // Sumamos las horas/minutos elegidos
  return new Date(midnightUTC.getTime() + hh * 3600000 + mm * 60000);
}

function getPeriod(h) {
  if (h < 6) return { label: "Madrugada", color: "period-night" };
  if (h < 12) return { label: "Mañana",   color: "period-morning" };
  if (h < 18) return { label: "Tarde",     color: "period-afternoon" };
  if (h < 22) return { label: "Noche",     color: "period-evening" };
  return       { label: "Madrugada",       color: "period-night" };
}

function getTimeInTZ(date, tz) {
  return new Intl.DateTimeFormat("es-AR", {
    hour: "2-digit", minute: "2-digit", second: "2-digit",
    hour12: false, timeZone: tz
  }).format(date);
}

function getDateInTZ(date, tz) {
  return new Intl.DateTimeFormat("es-AR", {
    weekday: "short", day: "numeric", month: "short",
    timeZone: tz
  }).format(date);
}

function getDiffLabel(date, baseTZ, targetTZ) {
  if (!baseTZ || baseTZ === targetTZ) return "";
  try {
    // Calcular offset en minutos entre los dos timezones
    const toMs = tz => {
      const s = new Date(date.toLocaleString("en", { timeZone: tz }));
      return s.getTime();
    };
    const diffMs = toMs(targetTZ) - toMs(baseTZ);
    const diffMin = Math.round(diffMs / 60000);
    if (diffMin === 0) return "Misma hora";
    const h = Math.floor(Math.abs(diffMin) / 60);
    const m = Math.abs(diffMin) % 60;
    const sign = diffMin > 0 ? "+" : "−";
    return m === 0 ? `${sign}${h}h` : `${sign}${h}h ${m}m`;
  } catch(_) { return ""; }
}

// ─────────────────────────────────────────────
// RENDER — solo actualiza textos, no recrea DOM
// ─────────────────────────────────────────────
let cardsBuilt = false;

function buildCards() {
  const container = document.getElementById("cities-container");
  container.innerHTML = "";
  cardsBuilt = false;

  if (state.cities.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🌐</div>
        <p><strong>No hay ciudades añadidas</strong></p>
        <p>Buscá una ciudad arriba o agregá tu zona horaria</p>
      </div>`;
    return;
  }

  state.cities.forEach((city, i) => {
    const isBase = i === state.base;
    const card = document.createElement("div");
    card.className = "city-card" + (isBase ? " is-base" : "");
    card.id = `card-${i}`;
    card.draggable = true;

    card.innerHTML = `
      <div class="city-left">
        <div class="city-name">${city.name}</div>
        <div class="city-tz">${city.tz}</div>
      </div>
      <div class="city-center">
        <div class="city-time" id="time-${i}"></div>
        <div class="city-date" id="date-${i}"></div>
        <div class="city-period" id="period-${i}"></div>
        <div class="city-diff" id="diff-${i}"></div>
      </div>
      <div class="city-right">
        <button class="btn-icon${isBase ? ' active' : ''}" id="base-btn-${i}" onclick="setBase(${i})" title="${isBase ? 'Ciudad base' : 'Establecer como base'}">
          ${isBase ? '⭐' : '☆'}
        </button>
        <button class="btn-icon" onclick="removeCity(${i})" title="Eliminar">🗑</button>
      </div>`;

    card.ondragstart = e => {
      e.dataTransfer.setData("idx", i);
      card.classList.add("dragging");
    };
    card.ondragend = () => card.classList.remove("dragging");
    card.ondragover = e => { e.preventDefault(); card.classList.add("drag-over"); };
    card.ondragleave = () => card.classList.remove("drag-over");
    card.ondrop = e => {
      e.preventDefault();
      card.classList.remove("drag-over");
      const from = parseInt(e.dataTransfer.getData("idx"));
      const to = i;
      if (from === to) return;
      const item = state.cities.splice(from, 1)[0];
      state.cities.splice(to, 0, item);
      if (state.base === from) state.base = to;
      else if (from < state.base && to >= state.base) state.base--;
      else if (from > state.base && to <= state.base) state.base++;
      saveState(); buildCards(); updateClocks();
    };

    container.appendChild(card);
  });

  cardsBuilt = true;
}

function updateClocks() {
  if (!cardsBuilt || state.cities.length === 0) return;
  const now = baseDate();
  const baseTZ = state.cities[state.base]?.tz;

  state.cities.forEach((city, i) => {
    const timeEl   = document.getElementById(`time-${i}`);
    const dateEl   = document.getElementById(`date-${i}`);
    const periodEl = document.getElementById(`period-${i}`);
    const diffEl   = document.getElementById(`diff-${i}`);
    const cardEl   = document.getElementById(`card-${i}`);
    if (!timeEl) return;

    const timeStr = getTimeInTZ(now, city.tz);
    const h = parseInt(timeStr.split(":")[0]);
    const period = getPeriod(h);

    // Solo actualiza texto si cambió (evita repaint innecesario)
    if (timeEl.textContent !== timeStr) timeEl.textContent = timeStr;

    const dateStr = getDateInTZ(now, city.tz);
    if (dateEl.textContent !== dateStr) dateEl.textContent = dateStr;

    if (periodEl.textContent !== period.label) periodEl.textContent = period.label;

    const diffStr = i === state.base ? "⭐ Base" : getDiffLabel(now, baseTZ, city.tz);
    if (diffEl.textContent !== diffStr) diffEl.textContent = diffStr;

    // Actualizar clase de color del período sin tocar todo el card
    const colorClasses = ["period-night","period-morning","period-afternoon","period-evening"];
    colorClasses.forEach(c => { timeEl.classList.remove(c); cardEl.classList.remove(c); });
    timeEl.classList.add(period.color);
    cardEl.classList.add(period.color);
  });
}

// ─────────────────────────────────────────────
// ACCIONES
// ─────────────────────────────────────────────
function setBase(i) { state.base = i; saveState(); buildCards(); updateClocks(); }

function removeCity(i) {
  state.cities.splice(i, 1);
  if (state.base >= state.cities.length) state.base = Math.max(0, state.cities.length - 1);
  saveState(); buildCards(); updateClocks();
}

function addCity(name, tz) {
  if (state.cities.some(c => c.tz === tz && c.name === name)) {
    showStatus("La ciudad ya está en la lista", "warn"); return;
  }
  state.cities.push({ name, tz });
  saveState(); buildCards(); updateClocks();
}

// ─────────────────────────────────────────────
// BÚSQUEDA (offline first, online complementa)
// ─────────────────────────────────────────────
const searchInput = document.getElementById("search");
const dropdown = document.getElementById("dropdown");
let debounceTimer;
let lastQuery = "";

searchInput.addEventListener("input", e => {
  clearTimeout(debounceTimer);
  const q = e.target.value.trim();
  if (q.length < 2) { closeDropdown(); return; }
  debounceTimer = setTimeout(() => doSearch(q), 250);
});

// Posicionar dropdown: position:absolute relativo al body, usando coordenadas de página
function positionDropdown() {
  const rect = searchInput.getBoundingClientRect();
  const scrollY = window.scrollY || document.documentElement.scrollTop;
  const scrollX = window.scrollX || document.documentElement.scrollLeft;
  dropdown.style.left  = (rect.left + scrollX) + "px";
  dropdown.style.top   = (rect.bottom + scrollY + 6) + "px";
  dropdown.style.width = rect.width + "px";
}
window.addEventListener("resize", () => { if (dropdown.classList.contains("open")) positionDropdown(); });
window.addEventListener("scroll", () => { if (dropdown.classList.contains("open")) positionDropdown(); }, true);

document.addEventListener("click", e => {
  const inInput = e.target.closest(".search-wrapper");
  const inDropdown = e.target.closest("#dropdown");
  if (!inInput && !inDropdown) closeDropdown();
});


searchInput.addEventListener("keydown", e => {
  if (e.key === "Escape") closeDropdown();
});

function closeDropdown() { dropdown.innerHTML = ""; dropdown.classList.remove("open"); }

function doSearch(q) {
  lastQuery = q;
  const lower = q.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  const offline = TZ_LIST.filter(item => {
    const n = item.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const t = item.tz.toLowerCase();
    return n.includes(lower) || t.includes(lower);
  }).slice(0, 8);

  showDropdownResults(offline, q, false);

  // Busca online SOLO si hay pocos resultados offline
  if (offline.length < 3 && navigator.onLine) {
    searchOnline(q);
  }
}

function showDropdownResults(results, q, isOnlineExtra) {
  // Si cambió la query mientras esperábamos, descartamos
  if (q !== lastQuery) return;

  if (isOnlineExtra) {
    // Agregar sección online al dropdown existente sin resetear
    if (results.length === 0) return;
    const label = document.createElement("div");
    label.className = "drop-section-label";
    label.textContent = "Resultados online";
    dropdown.appendChild(label);
    results.forEach(item => appendDropItem(item));
    return;
  }

  dropdown.innerHTML = "";

  if (results.length === 0) {
    const msg = document.createElement("div");
    msg.className = "drop-loading";
    msg.textContent = navigator.onLine ? `Buscando "${q}" online...` : `Sin resultados para "${q}"`;
    dropdown.appendChild(msg);
  } else {
    results.forEach(item => appendDropItem(item));
    if (navigator.onLine && results.length < 3) {
      const msg = document.createElement("div");
      msg.className = "drop-loading";
      msg.textContent = "Buscando más resultados online...";
      dropdown.appendChild(msg);
    }
  }

  positionDropdown();
  dropdown.classList.add("open");
}

function appendDropItem(item) {
  const div = document.createElement("div");
  div.className = "drop-item";
  div.innerHTML = `
    <div>${item.name} <span style="color:var(--text-muted);font-size:0.8rem;">${item.country || ''}</span></div>
    <div class="tz-label">${item.tz}</div>`;
  // mousedown con preventDefault evita que el input pierda el foco
  // antes de que se procese el click, previniendo el cierre prematuro
  div.addEventListener("mousedown", e => e.preventDefault());
  div.addEventListener("click", () => { addCity(item.name, item.tz); closeDropdown(); searchInput.value = ""; });
  dropdown.appendChild(div);
}

async function searchOnline(q) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&featuretype=city`,
      { headers: { "Accept-Language": "es" } }
    );
    if (!r.ok) return;
    const data = await r.json();
    if (!data.length || q !== lastQuery) return;

    const extras = [];
    for (const item of data.slice(0, 5)) {
      const tz = guessTimezoneFromCoords(parseFloat(item.lat), parseFloat(item.lon));
      const cleanName = (item.display_name || "").split(",")[0].trim();
      const country = item.display_name.split(",").slice(-1)[0].trim();
      // Evitar duplicados con lista offline
      const lower = cleanName.toLowerCase();
      if (!TZ_LIST.some(t => t.name.toLowerCase() === lower && t.tz === tz)) {
        extras.push({ name: cleanName, tz, country });
      }
    }

    // Quitar el mensaje "buscando online..." del dropdown
    const loadingMsg = dropdown.querySelector(".drop-loading");
    if (loadingMsg) loadingMsg.remove();

    if (extras.length > 0) showDropdownResults(extras, q, true);
  } catch(_) {
    const loadingMsg = dropdown.querySelector(".drop-loading");
    if (loadingMsg) loadingMsg.remove();
  }
}

// Calcula timezone a partir de longitud (aproximado, suficiente para la mayoría)
function guessTimezoneFromCoords(lat, lon) {
  // Intentamos matchear primero con nuestra lista por coordenadas aproximadas
  const COORDS = {
    "America/Argentina/Buenos_Aires": [-34.6, -58.4],
    "America/Sao_Paulo": [-23.5, -46.6],
    "America/New_York": [40.7, -74.0],
    "America/Chicago": [41.9, -87.6],
    "America/Denver": [39.7, -104.9],
    "America/Los_Angeles": [34.0, -118.2],
    "America/Mexico_City": [19.4, -99.1],
    "Europe/London": [51.5, -0.1],
    "Europe/Paris": [48.9, 2.3],
    "Europe/Berlin": [52.5, 13.4],
    "Europe/Madrid": [40.4, -3.7],
    "Europe/Rome": [41.9, 12.5],
    "Europe/Moscow": [55.7, 37.6],
    "Asia/Dubai": [25.2, 55.3],
    "Asia/Kolkata": [28.6, 77.2],
    "Asia/Shanghai": [31.2, 121.5],
    "Asia/Tokyo": [35.7, 139.7],
    "Asia/Seoul": [37.6, 127.0],
    "Asia/Singapore": [1.3, 103.8],
    "Australia/Sydney": [-33.9, 151.2],
    "Pacific/Auckland": [-36.9, 174.8],
    "Africa/Cairo": [30.1, 31.2],
    "Africa/Nairobi": [-1.3, 36.8],
    "Africa/Johannesburg": [-26.2, 28.0],
  };

  let best = null, bestDist = Infinity;
  for (const [tz, [tlat, tlon]] of Object.entries(COORDS)) {
    const dist = Math.abs(lat - tlat) + Math.abs(lon - tlon);
    if (dist < bestDist) { bestDist = dist; best = tz; }
  }

  // Si la distancia es razonable, usarlo
  if (bestDist < 8) return best;

  // Fallback: offset UTC por longitud
  const off = Math.round(lon / 15);
  if (off === 0) return "UTC";
  return `Etc/GMT${off > 0 ? '-' : '+'}${Math.abs(off)}`;
}

// ─────────────────────────────────────────────
// UBICACIÓN ACTUAL
// ─────────────────────────────────────────────
function addCurrentLocation() {
  const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
  // Buscar nombre en lista
  const found = TZ_LIST.find(t => t.tz === userTZ);
  const name = found ? `📍 ${found.name}` : `📍 ${userTZ.split("/").pop().replace(/_/g, " ")}`;
  addCity(name, userTZ);
}

// ─────────────────────────────────────────────
// CONTROLES DE TIEMPO
// ─────────────────────────────────────────────
function setModeNow() {
  state.useNow = true;
  saveState();
  document.getElementById("btn-now").classList.add("selected");
  document.getElementById("btn-custom").classList.remove("selected");
  const ti = document.getElementById("custom-time");
  ti.disabled = true;
  ti.style.opacity = "0.4";
  ti.style.pointerEvents = "none";
  updateClocks();
}

function setModeCustom() {
  state.useNow = false;
  saveState();
  document.getElementById("btn-custom").classList.add("selected");
  document.getElementById("btn-now").classList.remove("selected");
  const ti = document.getElementById("custom-time");
  ti.disabled = false;
  ti.style.opacity = "1";
  ti.style.pointerEvents = "auto";
  ti.focus();
  updateClocks();
}

function onCustomTime(input) {
  state.custom = input.value;
  if (state.useNow) setModeCustom();
  else { saveState(); updateClocks(); }
}

function showStatus(msg, type) {
  const el = document.getElementById("status-msg");
  el.textContent = msg;
  el.style.color = type === "warn" ? "var(--warning)" : type === "error" ? "var(--danger)" : "var(--success)";
  setTimeout(() => { el.textContent = ""; }, 3000);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
loadState();

// Restaurar estado UI de los botones
document.getElementById("custom-time").value = state.custom;
if (state.useNow) {
  document.getElementById("btn-now").classList.add("selected");
  document.getElementById("btn-custom").classList.remove("selected");
  document.getElementById("custom-time").disabled = true;
  document.getElementById("custom-time").style.opacity = "0.4";
  document.getElementById("custom-time").style.pointerEvents = "none";
} else {
  document.getElementById("btn-custom").classList.add("selected");
  document.getElementById("btn-now").classList.remove("selected");
  document.getElementById("custom-time").disabled = false;
  document.getElementById("custom-time").style.opacity = "1";
  document.getElementById("custom-time").style.pointerEvents = "auto";
}

if (state.cities.length === 0) addCurrentLocation();

buildCards();
updateClocks();
// El ticker solo actualiza los relojes, NO toca el DOM estructural
setInterval(updateClocks, 1000);
</script>
